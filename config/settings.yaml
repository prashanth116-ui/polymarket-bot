# Polymarket Trading Bot - Global Settings

mode: paper  # paper | live

# Bridge server
bridge:
  url: "http://127.0.0.1:8420"
  timeout: 10  # seconds

# Scan intervals (seconds)
scan:
  full_market_scan: 1800  # 30 min
  price_poll: 60  # 1 min
  news_poll: 900  # 15 min
  heartbeat: 3600  # 1 hour

# Risk limits
risk:
  bankroll: 10000  # USDC
  max_position_size: 200  # USDC per position
  max_positions: 10
  max_daily_loss: 500  # USDC
  max_consecutive_losses: 3
  max_exposure_pct: 0.50  # 50% of bankroll
  max_category_exposure_pct: 0.40  # 40% of bankroll per category
  kelly_fraction: 0.25  # Quarter Kelly
  min_hours_to_resolution: 24
  max_positions_per_category: 3   # Max open positions in one category
  max_correlated_positions: 2     # Max positions in correlated markets (same topic/keywords)
  max_same_outcome_per_category: 2  # Max same-outcome bets per category (prevents all-NO bias)
  cooldown_minutes: 60              # Wait 60 min before re-entering exited market
  max_entries_per_market_per_day: 2  # Max entries per market per day

# Strategy defaults
strategy:
  min_edge: 0.07  # 7% — ~3% net margin after 4% round-trip fees
  min_confidence: 0.65
  min_liquidity: 1000  # USDC — thin markets have noisier prices
  min_ev: 2.0  # Minimum expected value ($) to take a trade
  stat_only_min_edge: 0.12  # Min edge when no LLM available (stat models alone)
  max_model_disagreement: 0.15  # Reject when model predictions diverge too much

# Exit tuning
exits:
  trailing_stop_trigger: 0.20   # Activate trailing stop after 20% gain
  trailing_stop_retracement: 0.50  # Exit if unrealized drops below 50% of peak
  stop_loss_tight: 0.20  # Stop loss for small-edge trades (<8%)
  stop_loss_wide: 0.30   # Stop loss for large-edge trades (>=8%)
  edge_gone_checks: 3    # Consecutive checks with edge < 40% threshold before edge_gone exit
  min_hold_minutes: 30   # Minimum hold time (minutes) before edge_gone/decay exit allowed
  edge_decay_threshold: 0.03  # Edge must stay above 3%
  edge_decay_checks: 4   # Consecutive checks below threshold before exit
  tp_near_hours: 24      # Hours to resolution: near
  tp_near_pct: 0.15      # Take profit if gain > 15% (near resolution)
  tp_mid_pct: 0.30       # Take profit if gain > 30% (24-72h)
  tp_far_pct: 0.50       # Take profit if gain > 50% (>72h)

# Market filters
filters:
  min_volume_24h: 100  # USDC
  max_price_for_buy: 0.95
  min_price_for_buy: 0.05
  categories:
    - politics
    - crypto
    - sports
    - science
    - economics

# Market Making
market_maker:
  enabled: true
  base_spread: 0.06
  min_spread: 0.04
  max_spread: 0.15
  max_inventory: 200
  quote_size: 20
  boundary_buffer: 0.08
  min_liquidity: 500

# Arbitrage
arbitrage:
  enabled: true
  min_profit_bps: 50  # 0.5% minimum profit
  max_position: 100   # USDC per arb

# Strategy coordinator
coordinator:
  max_mm_markets: 10
  max_mm_exposure: 500   # USDC
  max_arb_exposure: 200  # USDC

# WebSocket price streaming
websocket:
  enabled: true
  fallback_to_rest: true

# Position reconciliation (live mode only)
reconciliation:
  interval: 300  # seconds (5 min)

# Deployment
deploy:
  droplet_ip: "107.170.74.154"

# Telegram alerts
telegram:
  enabled: true
  heartbeat_interval: 3600  # 1 hour

# Logging
logging:
  level: INFO
  file: logs/polymarket.log

# Database
database:
  path: data/polymarket.db
  retention_days: 90
